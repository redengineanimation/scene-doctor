name: Deploy docs

# Publishes the MkDocs site to GitHub Pages on every push to main that
# touches the docs. First run: in the repo, Settings -> Pages -> Source =
# "GitHub Actions". Uses mike so /latest/ versioning works like the nav.

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Publish this build as "latest" and set it as the default version.
      - name: Deploy with mike
        run: |
          mike deploy --push --update-aliases latest
          mike set-default --push latest
